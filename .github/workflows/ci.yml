name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Security audit - blocks high and critical vulnerabilities
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Release dependency audit
        run: npm run audit:release

  # Build verification
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build
        run: npm run build
  # Lint check (blocking)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Run linter
        run: npm run lint --if-present

  # Type-check — BLOCKING. Catches the "silent drop adapter" class of
  # bug (the audit's pattern A): when a backend DTO field is added or
  # changed, any frontend interface that declares the wire shape will
  # type-error if it omits the field. Phase 1 #4 (bio dropped between
  # FeaturedWorker → WorkerProfile) and Phase 2 #8 (SwipeMatch fictional
  # interface) would both have failed this gate before merge.
  typecheck:
    name: TypeScript (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: tsc --noEmit
        run: npm run typecheck

  # Nav contract — BLOCKING. Walks src/app/** and asserts every href in
  # the centralised NAV_ITEMS contract resolves to a real page.tsx. This
  # is the gate that catches the "orphan link" / pattern E class of bug
  # (Phase 3 #10 #11). Scoped to the contract test so the broader
  # vitest run doesn't trip on a known JSDOM/ESM issue in component
  # tests (tracked separately).
  nav-contract:
    name: Nav route contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: vitest src/lib/nav.test.ts
        run: npx vitest run src/lib/nav.test.ts

  # E2E (F1) — BLOCKING. Boots the app (npm run dev via playwright.config
  # webServer) and proves the /publier-besoin public funnel end-to-end:
  # form fill -> POST payload contract -> "Demande recue" confirmation. The
  # POST is mocked in-test, so no backend or seed data is touched. Guards
  # flow F1 of the Launch Readiness contract against regressions.
  e2e:
    name: E2E (F1 publier-besoin + consent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Run F1 + consent E2E
        run: npx playwright test e2e/publier-besoin.spec.ts e2e/consent-cta.spec.ts --project=chromium
  # E2E (F2) — BLOCKING. Proves the /register onboarding funnel with a
  # fully mocked network: credentials -> role -> profile -> hydrated success.
  # No real account, backend call, or production data is created.
  e2e-register:
    name: E2E (F2 inscription)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Run F2 E2E
        run: npx playwright test e2e/register-funnel.spec.ts --project=chromium
  # E2E (F3/F4) — BLOCKING. Gated (app) routes via mocked auth (cookie +
  # hydrated user + refresh + consent): mission creation (F3) and bilateral
  # invoice acceptance / escrow (F4). Network fully mocked — no backend,
  # Stripe, or seed data. F3's spec landed (#284) but was unguarded; F4 is
  # new. F5 = role gating of /admin (worker blocked, admin allowed). Guards
  # flows F3 + F4 + F5 of the Launch Readiness contract.
  e2e-gated:
    name: E2E (F3/F4/F5 + map gated)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Run F3 + F4 + F5 + map + contracts + invoices + receipts + trust center E2E
        run: npx playwright test e2e/mission-create.spec.ts e2e/invoice-review.spec.ts e2e/admin-role-gate.spec.ts e2e/map.spec.ts e2e/contracts.spec.ts e2e/invoices.spec.ts e2e/receipts.spec.ts e2e/profile-verify.spec.ts --project=chromium

  # A11y (axe) — BLOCKING. Vérification WCAG runtime sur une page P0 publique.
  # Échoue sur les violations `critical`, logue toutes les violations pour
  # l'audit. Complète le filet statique eslint-plugin-jsx-a11y (warn).
  a11y:
    name: A11y (axe /publier-besoin)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Run a11y E2E
        run: npx playwright test e2e/a11y.spec.ts --project=chromium
