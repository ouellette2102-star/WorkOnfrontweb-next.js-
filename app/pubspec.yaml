name: workon_app
description: "WorkOn — Trouvez votre talent. Réservez en 1 tap."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & Storage
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^12.1.3

  # UI Components
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.2
  lottie: ^3.1.2
  flutter_svg: ^2.1.0
  font_awesome_flutter: ^10.7.0
  auto_size_text: ^3.0.0
  photo_view: ^0.15.0

  # Date & Time
  intl: ^0.20.2
  timeago: ^3.7.1
  table_calendar: ^3.2.0

  # Maps & Location
  geolocator: ^13.0.2
  google_maps_flutter: ^2.5.3

  # Payments
  flutter_stripe: ^11.4.0

  # Firebase Push
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  device_info_plus: ^10.1.2

  # Swipe Cards
  flutter_card_swiper: ^7.0.1

  # Media
  image_picker: ^1.1.2

  # Sharing
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Forms
  mask_text_input_formatter: ^2.9.0
  pin_code_fields: ^8.0.1
  dropdown_button2: ^2.3.9

  # Utilities
  collection: ^1.19.1
  path_provider: ^2.1.4
  universal_io: ^2.2.2

dependency_overrides:
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/images/workon_app_icon.png'
  adaptive_icon_background: '#0D0D0F'
  adaptive_icon_foreground: 'assets/images/workon_app_icon.png'
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/

  fonts:
    - family: 'General Sans'
      fonts:
        - asset: assets/fonts/GeneralSans-Extralight.otf
          weight: 200
        - asset: assets/fonts/GeneralSans-ExtralightItalic.otf
          weight: 200
          style: italic
        - asset: assets/fonts/GeneralSans-Light.otf
          weight: 300
        - asset: assets/fonts/GeneralSans-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/GeneralSans-Regular.otf
        - asset: assets/fonts/GeneralSans-Italic.otf
          style: italic
        - asset: assets/fonts/GeneralSans-Medium.otf
          weight: 500
        - asset: assets/fonts/GeneralSans-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/GeneralSans-Semibold.otf
          weight: 600
        - asset: assets/fonts/GeneralSans-SemiboldItalic.otf
          weight: 600
          style: italic
        - asset: assets/fonts/GeneralSans-Bold.otf
          weight: 700
        - asset: assets/fonts/GeneralSans-BoldItalic.otf
          weight: 700
          style: italic
    - family: MigambiIconOutline
      fonts:
        - asset: assets/fonts/Migambi--Icon--Outline.ttf
    - family: MigambiVIPIcons
      fonts:
        - asset: assets/fonts/Migambi-VIP-Icons.ttf
